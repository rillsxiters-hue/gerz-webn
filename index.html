<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GERZ Panel</title>
<style>
    body {
        margin: 0;
        background: #111;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .panel {
        width: 500px;
        background: #1a1a1a;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(255,0,0,0.4);
        padding: 20px;
        color: white;
        position: relative;
    }

    .title {
        font-size: 26px;
        font-weight: bold;
        color: red;
    }

    .close {
        position: absolute;
        top: 10px;
        right: 15px;
        color: red;
        cursor: pointer;
        font-size: 18px;
    }

    .menu {
        margin-top: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #333;
        padding-bottom: 8px;
    }

    .label {
        font-size: 14px;
        color: #ccc;
    }

    .switch {
        width: 40px;
        height: 20px;
        background: #333;
        border-radius: 20px;
        position: relative;
        cursor: pointer;
    }

    .switch::before {
        content: "";
        width: 18px;
        height: 18px;
        background: white;
        border-radius: 50%;
        position: absolute;
        top: 1px;
        left: 1px;
        transition: 0.3s;
    }

    .switch.active {
        background: red;
    }

    .switch.active::before {
        left: 21px;
    }

    .button {
        background: #222;
        border: 1px solid red;
        color: red;
        padding: 5px 10px;
        border-radius: 5px;
        cursor: pointer;
    }

</style>
</head>
<body>

<div class="panel">
    <div class="title">GERZ</div>
    <div class="close">X</div>

    <div class="menu">
        <div class="item">
            <div class="label">Hide Panel (F4)</div>
            <button class="button">F4</button>
        </div>

        <div class="item">
            <div class="label">Aimbot Type</div>
            <button class="button">HEAD</button>
        </div>

        <div class="item">
            <div class="label">Selected Target</div>
            <div class="switch"></div>
        </div>

        <div class="item">
            <div class="label">No Recoil</div>
            <div class="switch"></div>
        </div>

        <div class="item">
            <div class="label">Wall Hack</div>
            <div class="switch"></div>
        </div>
    </div>
</div>

<script>
    document.querySelectorAll('.switch').forEach(sw => {
        sw.addEventListener('click', () => {
            sw.classList.toggle('active');
        });
    });
</script>

</body>
</html>
